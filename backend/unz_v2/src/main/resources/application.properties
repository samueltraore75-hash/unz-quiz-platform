# ── Serveur ──────────────────────────────────────────────────────────────
# Railway (et la plupart des hébergeurs) assignent leur propre port via la
# variable d'environnement PORT — 8080 reste la valeur par défaut en local.
server.port=${PORT:8080}

# ── MySQL ─────────────────────────────────────────────────────────────────
# Les valeurs après les ":" sont des valeurs par défaut, utilisées seulement
# si la variable d'environnement correspondante n'est pas définie — pratique
# en développement local, mais AVANT UN VRAI DÉPLOIEMENT il faut définir ces
# variables d'environnement (DB_USERNAME, DB_PASSWORD, JWT_SECRET, etc.) et
# ne surtout pas laisser les valeurs par défaut ci-dessous dans un dépôt Git
# public — ce ne sont que des filets de sécurité pour ne pas bloquer les tests.
#
# Sur Railway, quand tu ajoutes un plugin MySQL, il injecte automatiquement
# MYSQLHOST / MYSQLPORT / MYSQLDATABASE / MYSQLUSER / MYSQLPASSWORD — ces
# valeurs sont utilisées en priorité si elles existent, sinon on retombe sur
# DB_USERNAME/DB_PASSWORD (déploiement manuel), sinon sur le local par défaut.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:unz_eval}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:${DB_USERNAME:unz_user}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD:unz_password}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────
# Le schéma est désormais géré par Flyway (voir src/main/resources/db/migration).
# "validate" vérifie que les entités correspondent au schéma réel, sans jamais le modifier.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT (ENF-7) ───────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:UNZEvalPlatform2025SecretKeyPourJWTDoitEtre256BitsMinimumSecurise!}
app.jwt.access-expiration-ms=1800000
app.jwt.refresh-expiration-ms=86400000

# ── CORS ──────────────────────────────────────────────────────────────────
# En production, définis CORS_ALLOWED_ORIGINS avec l'URL réelle du frontend
# déployé (ex: https://unzquiz-frontend.up.railway.app), séparées par des
# virgules si plusieurs. Les valeurs ci-dessous ne servent qu'en local.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://localhost:5173,http://127.0.0.1:5173}

# ── Frontend (lien dans l'e-mail de réinitialisation de mot de passe) ─────
# En production, définis FRONTEND_URL avec l'URL réelle du frontend déployé
# (ex: https://unzquiz-frontend.up.railway.app), sans slash final.
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Chiffrement AES-256 (ENF-6) ──────────────────────────────────────────
app.encryption.key=${ENCRYPTION_KEY:UNZ2025AES256KeyPourChiffrementDonneesPersonnelles!32c}

# ── Rate Limiting ─────────────────────────────────────────────────────────
app.rate-limit.login.capacity=20
app.rate-limit.login.refill-minutes=5
app.rate-limit.api.capacity=200
app.rate-limit.api.refill-minutes=1

# ── Upload fichiers CSV ────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Logs ──────────────────────────────────────────────────────────────────
logging.level.com.unz.eval=INFO
logging.level.org.springframework.security=WARN

# ── E-mail (SMTP Gmail) ────────────────────────────────────────────────────
# app.mail.enabled=false désactive l'envoi (les actions admin fonctionnent quand même,
# l'e-mail est juste sauté avec un message dans les logs) — utile si pas encore configuré.
app.mail.enabled=true
app.mail.from=${MAIL_FROM:TON_ADRESSE@gmail.com}
app.mail.from-name=UNZ Quiz

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:TON_ADRESSE@gmail.com}
spring.mail.password=${MAIL_PASSWORD:TON_MOT_DE_PASSE_APPLICATION_16_CARACTERES}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
